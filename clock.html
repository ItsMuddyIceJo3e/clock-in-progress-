<!DOCTYPE html>
  <html lang="undefined">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muddy's JS Live Clock</title>
    <style>
      #live-clock {
        font-size: 48px;
        font-family: 'comic sans ms', sans-serif;
        color: #2a09a0;
        text-align: center;
        margin-top: 20%;
        border: yellow 5px solid;
      }
    </style>
  </head>
  <body>
      <button onclick="toggleBackgroundColor()">Change Background Color</button> 
         <a href='https://github.com/ItsMuddyIceJo3e'>My Github</a>

         <select id="timezone-select" onchange="updateClock()"> // dropdown menu for timezone selection
            <option value="default">Default Timezone</option>
            <option value="UTC">UTC</option>
            <option value="America/New_York">New York (EST)</option>
            <option value="America/Chicago">Chicago (CST)</option>
            <option value="America/Guatemala City">Guatemala City (CST)</option>
            <option value="Europe/London">London (GMT)</option>
            <option value="Asia/Tokyo">Tokyo (JST)</option>
            <option value="Australia/Sydney">Sydney (AEST)</option>
            <option value="America/Los_Angeles">Los Angeles (PST)</option>
            <option value="Europe/Paris">Paris (CET)</option>
            <option value="Asia/Beijing">Beijing (CST)</option>
            <option value="America/Chicago">Chicago (CST)</option>
            <option value="Europe/Berlin">Berlin (CET)</option>
            <option value="Pacific/Honolulu">Honolulu (HST)</option> 
          </select> 
        
          
      
        <div id = "live-clock">00:00:00</div>
          <script>
            function toggleBackgroundColor() {
              if (document.body.style.backgroundColor === 'black') {
                document.body.style.backgroundColor = 'white';
                document.body.style.color = 'black';
              } else {
                document.body.style.backgroundColor = 'black';
                document.body.style.color = 'white';
              }
            }

            function updateClock() {
              const now = new Date();
              const selectedTimezone = document.getElementById('timezone-select').value;
              const timeString = now.toLocaleTimeString('en-US', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: true,
                timeZoneName: 'short',
                timeZone: selectedTimezone
              });
              document.getElementById('live-clock').textContent = timeString;   
                              // clock will update every second         
          if (now.getHours() === 0 && now.getMinutes() === 0 && now.getSeconds() === 0) 
            alert('It is now midnight! GO TO SLEEP!'); 
            // will give a midnight alert 
          }

            setInterval(updateClock, 1000); 
            updateClock(); // initial call to display clock immediately
            
          </script>
  </body>
</html>
